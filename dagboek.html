<div class="page-header">
  <h1><i class="fa fa-book-open"></i> Vakantiedagboek</h1>
  <p>De mooiste momenten, dag voor dag vastgelegd</p>
</div>

<div class="container" style="max-width:800px;">

  <!-- Toevoegen knop -->
  <div style="display:flex;justify-content:flex-end;margin-bottom:1.5rem;">
    <button class="btn btn-primary" id="open-dagboek-modal">
      <i class="fa fa-plus"></i> Nieuw dagboekitem
    </button>
  </div>

  <!-- Dagboek entries -->
  <div id="dagboek-lijst">
    <div style="text-align:center;padding:4rem 1rem;color:var(--text-light);">
      <i class="fa fa-spinner fa-spin" style="font-size:1.5rem;display:block;margin-bottom:0.5rem;"></i>
      Dagboek laden...
    </div>
  </div>

</div>

<!-- MODAL: nieuw item -->
<div class="modal-overlay" id="dagboek-modal">
  <div class="modal">
    <h2><i class="fa fa-book-open" style="color:var(--secondary)"></i> Nieuw dagboekitem</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Datum *</label>
        <input type="date" id="d-datum" min="2027-04-28" max="2027-05-07">
      </div>
      <div class="form-group">
        <label>Auteur</label>
        <select id="d-auteur">
          <option value="">— kies —</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Titel *</label>
      <input type="text" id="d-titel" placeholder="Bijv. Geweldig dagje strand! 🌊">
    </div>
    <div class="form-group">
      <label>Beschrijving</label>
      <textarea id="d-tekst" rows="5" placeholder="Vertel over deze dag... Wat maakten jullie mee? Wat was het hoogtepunt?"></textarea>
    </div>
    <div class="form-group">
      <label>Foto <span style="color:var(--text-light);font-weight:400;">(optioneel)</span></label>
      <label style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border:1.5px dashed var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s;" id="foto-label">
        <i class="fa fa-cloud-arrow-up" style="font-size:1.3rem;color:var(--border);"></i>
        <span id="foto-naam" style="font-size:0.88rem;color:var(--text-light);">Klik om een foto te kiezen</span>
        <input type="file" id="d-foto" accept="image/*" style="display:none">
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="sluit-dagboek-modal">Annuleren</button>
      <button class="btn btn-primary" id="sla-dagboek-op">
        <i class="fa fa-floppy-disk"></i> Opslaan
      </button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close"><i class="fa fa-xmark"></i></button>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
let entries = [];
let deelnemers = [];

const MAANDEN_LANG = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const DAGEN_NL = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];

async function init() {
  const [{ data: d }, { data: e }] = await Promise.all([
    db.from('deelnemers').select('naam').order('id'),
    db.from('dagboek').select('*').order('datum', { ascending: true }).order('created_at', { ascending: true }),
  ]);
  deelnemers = d || [];
  entries = e || [];

  const sel = document.getElementById('d-auteur');
  const opgeslagen = localStorage.getItem('dagboek_auteur');
  deelnemers.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.naam; opt.textContent = d.naam;
    if (d.naam === opgeslagen) opt.selected = true;
    sel.appendChild(opt);
  });

  // Standaard datum = eerste vakantiedag
  document.getElementById('d-datum').value = '2027-04-28';

  renderDagboek();
}

function renderDagboek() {
  const lijst = document.getElementById('dagboek-lijst');
  if (!entries.length) {
    lijst.innerHTML = `
      <div style="text-align:center;padding:4.5rem 1rem;color:var(--text-light);">
        <i class="fa fa-book-open" style="font-size:3rem;display:block;margin-bottom:1rem;opacity:0.2;"></i>
        <div style="font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:0.4rem;">Het dagboek is nog leeg</div>
        <div style="font-size:0.88rem;">Voeg na elke vakantiedag een mooie herinnering toe!</div>
      </div>`;
    return;
  }

  lijst.innerHTML = '';
  entries.forEach(e => {
    const d = new Date(e.datum + 'T12:00:00');
    const datumLabel = `${DAGEN_NL[d.getDay()]} ${d.getDate()} ${MAANDEN_LANG[d.getMonth()]}`;

    const el = document.createElement('div');
    el.className = 'dagboek-entry';

    const titel = e.titel.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const tekst = e.tekst ? e.tekst.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';

    el.innerHTML = `
      <button onclick="verwijderEntry(${e.id},'${e.foto_url || ''}')" class="del-btn" title="Verwijderen"
        style="position:absolute;top:1rem;right:1rem;background:rgba(0,0,0,0.06);border:none;cursor:pointer;color:var(--text-light);font-size:0.85rem;padding:0.35rem 0.5rem;border-radius:8px;opacity:0;transition:opacity 0.2s;">
        <i class="fa fa-trash"></i>
      </button>
      <div class="dagboek-datum-badge"><i class="fa fa-calendar"></i> ${datumLabel}</div>
      ${e.foto_url ? `<img class="dagboek-foto" src="${e.foto_url}" alt="${titel}" loading="lazy">` : ''}
      <div class="dagboek-titel">${titel}</div>
      ${tekst ? `<div class="dagboek-tekst">${tekst}</div>` : ''}
      ${e.auteur ? `<div class="dagboek-auteur"><i class="fa fa-pen-nib"></i> ${e.auteur}</div>` : ''}
    `;

    el.addEventListener('mouseenter', () => el.querySelector('.del-btn').style.opacity = '1');
    el.addEventListener('mouseleave', () => el.querySelector('.del-btn').style.opacity = '0');

    if (e.foto_url) {
      el.querySelector('.dagboek-foto').addEventListener('click', () => openLightbox(e.foto_url));
    }

    lijst.appendChild(el);
  });
}

async function verwijderEntry(id, fotoUrl) {
  if (!confirm('Dagboekitem verwijderen?')) return;
  const taken = [db.from('dagboek').delete().eq('id', id)];
  if (fotoUrl) {
    const pad = fotoUrl.split('/fotos/')[1];
    if (pad) taken.push(db.storage.from('fotos').remove([pad]));
  }
  await Promise.all(taken);
  entries = entries.filter(e => e.id !== id);
  renderDagboek();
}

// Foto preview
document.getElementById('d-foto').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) {
    document.getElementById('foto-naam').textContent = f.name;
    document.getElementById('foto-label').style.borderColor = 'var(--secondary)';
  } else {
    document.getElementById('foto-naam').textContent = 'Klik om een foto te kiezen';
    document.getElementById('foto-label').style.borderColor = 'var(--border)';
  }
});

// Modal openen/sluiten
document.getElementById('open-dagboek-modal').addEventListener('click', () =>
  document.getElementById('dagboek-modal').classList.add('open'));
document.getElementById('sluit-dagboek-modal').addEventListener('click', () =>
  document.getElementById('dagboek-modal').classList.remove('open'));
document.getElementById('dagboek-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('dagboek-modal'))
    document.getElementById('dagboek-modal').classList.remove('open');
});

// Opslaan
document.getElementById('sla-dagboek-op').addEventListener('click', async () => {
  const datum  = document.getElementById('d-datum').value;
  const titel  = document.getElementById('d-titel').value.trim();
  const tekst  = document.getElementById('d-tekst').value.trim();
  const auteur = document.getElementById('d-auteur').value;
  const fotoFile = document.getElementById('d-foto').files[0];

  if (!datum) { alert('Kies een datum.'); return; }
  if (!titel) { alert('Vul een titel in.'); return; }

  const btn = document.getElementById('sla-dagboek-op');
  btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Opslaan...';

  let fotoUrl = null;
  if (fotoFile) {
    try { fotoUrl = await uploadFoto('dagboek', fotoFile); } catch {}
  }

  const { data } = await db.from('dagboek').insert({
    datum, titel,
    tekst: tekst || null,
    auteur: auteur || null,
    foto_url: fotoUrl,
  }).select().single();

  if (data) {
    // Voeg in op juiste positie (gesorteerd op datum)
    entries.push(data);
    entries.sort((a, b) => a.datum.localeCompare(b.datum) || a.created_at.localeCompare(b.created_at));
    renderDagboek();
    if (auteur) localStorage.setItem('dagboek_auteur', auteur);
  }

  // Reset
  document.getElementById('d-titel').value = '';
  document.getElementById('d-tekst').value = '';
  document.getElementById('d-foto').value = '';
  document.getElementById('foto-naam').textContent = 'Klik om een foto te kiezen';
  document.getElementById('foto-label').style.borderColor = 'var(--border)';
  document.getElementById('dagboek-modal').classList.remove('open');
  btn.disabled = false; btn.innerHTML = '<i class="fa fa-floppy-disk"></i> Opslaan';
});

// Auteur onthouden
document.getElementById('d-auteur').addEventListener('change', e => {
  if (e.target.value) localStorage.setItem('dagboek_auteur', e.target.value);
});

// Lightbox
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox-close').addEventListener('click', () =>
  document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
});

init();
toonMeldingBanner();
</script>
