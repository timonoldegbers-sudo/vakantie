<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerij — Vakantie Oldegbers</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">🌊 <span>Vakantie</span> Oldegbers</a>
  <a href="index.html"><i class="fa fa-house"></i> Dashboard</a>
  <a href="gallery.html" class="active"><i class="fa fa-images"></i> Galerij</a>
  <a href="activities.html"><i class="fa fa-map-pin"></i> Activiteiten</a>
  <a href="checklist.html"><i class="fa fa-list-check"></i> Inpaklijst</a>
</nav>

<div class="page-header">
  <h1><i class="fa fa-images"></i> Foto Galerij</h1>
  <p>Deel je mooiste vakantieherinneringen</p>
</div>

<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
    <div style="color:var(--text-light);font-size:0.9rem;" id="foto-teller">0 foto's</div>
    <div style="display:flex;gap:0.75rem;align-items:center;">
      <select id="filter-persoon" style="padding:0.5rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;background:white;">
        <option value="">Iedereen</option>
      </select>
      <label class="btn btn-primary" for="foto-upload">
        <i class="fa fa-plus"></i> Foto's toevoegen
        <input type="file" id="foto-upload" accept="image/*" multiple style="display:none">
      </label>
    </div>
  </div>

  <div class="gallery-grid" id="gallery-grid">
    <label class="gallery-upload-box" for="foto-upload" style="aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;">
      <i class="fa fa-cloud-arrow-up" style="font-size:2.5rem;color:var(--border)"></i>
      <span>Klik om foto's toe te voegen</span>
    </label>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close"><i class="fa fa-xmark"></i></button>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="js/app.js"></script>
<script>
let fotos = loadData('galerij', []);
const deelnemers = loadData('deelnemers', DEFAULT_DEELNEMERS);

// Vul filter dropdown
const filterSelect = document.getElementById('filter-persoon');
deelnemers.forEach(d => {
  const opt = document.createElement('option');
  opt.value = d.naam;
  opt.textContent = d.naam;
  filterSelect.appendChild(opt);
});

function renderGalerij() {
  const grid = document.getElementById('gallery-grid');
  const filter = filterSelect.value;
  const gefilterd = filter ? fotos.filter(f => f.uploader === filter) : fotos;

  // Bewaar upload-box
  grid.innerHTML = `
    <label class="gallery-upload-box" for="foto-upload" style="aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;">
      <i class="fa fa-cloud-arrow-up" style="font-size:2.5rem;color:var(--border)"></i>
      <span>Klik om foto's toe te voegen</span>
    </label>
  `;

  gefilterd.forEach((foto, i) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `
      <img src="${foto.data}" alt="${foto.naam || ''}">
      <div class="overlay">
        <div style="color:white;text-align:center;">
          <i class="fa fa-magnifying-glass-plus" style="font-size:1.5rem;"></i>
          ${foto.uploader ? `<div style="font-size:0.8rem;margin-top:0.3rem;">${foto.uploader}</div>` : ''}
        </div>
      </div>
      <button onclick="verwijderFoto(${fotos.indexOf(foto)})" style="position:absolute;top:0.5rem;right:0.5rem;background:rgba(0,0,0,0.5);color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;">
        <i class="fa fa-trash"></i>
      </button>
    `;
    item.addEventListener('mouseenter', () => item.querySelector('button').style.opacity = '1');
    item.addEventListener('mouseleave', () => item.querySelector('button').style.opacity = '0');
    item.querySelector('img').addEventListener('click', () => openLightbox(foto.data));
    grid.appendChild(item);
  });

  document.getElementById('foto-teller').textContent =
    `${gefilterd.length} foto${gefilterd.length !== 1 ? "'s" : ''}${filter ? ` van ${filter}` : ''}`;
}

document.getElementById('foto-upload').addEventListener('change', e => {
  const persoon = filterSelect.value || '';
  const files = Array.from(e.target.files);
  let geladen = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      fotos.push({ data: ev.target.result, naam: file.name, uploader: persoon, datum: new Date().toISOString() });
      geladen++;
      if (geladen === files.length) {
        saveData('galerij', fotos);
        renderGalerij();
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

function verwijderFoto(index) {
  if (confirm('Foto verwijderen?')) {
    fotos.splice(index, 1);
    saveData('galerij', fotos);
    renderGalerij();
  }
}

filterSelect.addEventListener('change', renderGalerij);

// Lightbox
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox-close').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
});

renderGalerij();
</script>
</body>
</html>
