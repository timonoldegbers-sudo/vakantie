<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inpaklijst — Vakantie Oldegbers</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">🌊 <span>Vakantie</span> Oldegbers</a>
  <a href="index.html" class="nav-link"><i class="fa fa-house"></i> Dashboard</a>
  <a href="gallery.html" class="nav-link"><i class="fa fa-images"></i> Galerij</a>
  <a href="activities.html" class="nav-link"><i class="fa fa-map-pin"></i> Activiteiten</a>
  <a href="checklist.html" class="nav-link active"><i class="fa fa-list-check"></i> Inpaklijst</a>
</nav>

<div class="page-header">
  <h1><i class="fa fa-list-check"></i> Inpaklijst & Checklist</h1>
  <p>Zorg dat je niets vergeet!</p>
</div>

<div class="container">

  <!-- PROGRESSBAR -->
  <div class="card" style="margin-bottom:1.5rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
      <div class="card-title" style="margin-bottom:0;"><i class="fa fa-chart-line"></i> Voortgang</div>
      <div style="font-weight:700;color:var(--primary);" id="progress-tekst">0 / 0 ingepakt</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
      <button class="btn btn-outline btn-sm" id="reset-btn"><i class="fa fa-rotate-left"></i> Alles uitvinken</button>
      <button class="btn btn-outline btn-sm" id="alles-btn"><i class="fa fa-check-double"></i> Alles aanvinken</button>
      <button class="btn btn-primary btn-sm" id="open-toevoeg-modal"><i class="fa fa-plus"></i> Item toevoegen</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="persoonlijk">👤 Persoonlijk</button>
    <button class="tab-btn" data-tab="gezamenlijk">🏡 Gezamenlijk</button>
  </div>

  <div id="checklist-container"></div>
</div>

<!-- MODAL: toevoegen -->
<div class="modal-overlay" id="toevoeg-modal">
  <div class="modal">
    <h2><i class="fa fa-plus-circle" style="color:var(--secondary)"></i> Item toevoegen</h2>
    <div class="form-group">
      <label>Naam</label>
      <input type="text" id="ni-naam" placeholder="bijv. Zonnebrand SPF 50">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categorie</label>
        <select id="ni-categorie">
          <option value="👕 Kleding">👕 Kleding</option>
          <option value="🧴 Toilettas">🧴 Toilettas</option>
          <option value="📄 Documenten">📄 Documenten</option>
          <option value="🔌 Elektronica">🔌 Elektronica</option>
          <option value="🏖️ Strand">🏖️ Strand</option>
          <option value="💊 Medicijnen">💊 Medicijnen</option>
          <option value="🎲 Spelletjes">🎲 Spelletjes</option>
          <option value="🏠 Huis">🏠 Huis</option>
          <option value="📦 Diversen">📦 Diversen</option>
        </select>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="ni-type">
          <option value="persoonlijk">👤 Persoonlijk</option>
          <option value="gezamenlijk">🏡 Gezamenlijk</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="sluit-toevoeg">Annuleren</button>
      <button class="btn btn-primary" id="sla-item-op">Toevoegen</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
let items = [];
let actieveTab = 'persoonlijk';

function actieveItems() {
  return items.filter(i => (i.type || 'persoonlijk') === actieveTab);
}

async function laadChecklist() {
  const { data } = await db.from('checklist').select('*').order('id');
  items = data || [];
  renderChecklist();
}

function updateProgress() {
  const lijst = actieveItems();
  const totaal = lijst.length;
  const gedaan = lijst.filter(i => i.gedaan).length;
  const pct = totaal ? Math.round(gedaan / totaal * 100) : 0;
  document.getElementById('progress-tekst').textContent = `${gedaan} / ${totaal} ingepakt`;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function renderChecklist() {
  const container = document.getElementById('checklist-container');
  container.innerHTML = '';
  const lijst = actieveItems();
  const categorieen = [...new Set(lijst.map(i => i.categorie))];
  categorieen.forEach(cat => {
    const catItems = lijst.filter(i => i.categorie === cat);
    const gedaan = catItems.filter(i => i.gedaan).length;
    const safeId = btoa(encodeURIComponent(cat)).replace(/[^a-zA-Z0-9]/g,'');
    const section = document.createElement('div');
    section.className = 'checklist-section';
    section.innerHTML = `
      <div class="checklist-section-title">
        ${cat}
        <span style="font-size:0.8rem;font-weight:400;color:var(--text-light);margin-left:0.5rem;">${gedaan}/${catItems.length}</span>
      </div>
      <div class="checklist-items" id="cat-${safeId}"></div>
    `;
    const itemsDiv = section.querySelector(`#cat-${safeId}`);
    catItems.forEach(item => {
      const el = document.createElement('div');
      el.className = 'check-item' + (item.gedaan ? ' done' : '');
      el.innerHTML = `
        <div class="check-box">${item.gedaan ? '✓' : ''}</div>
        <span class="check-label">${item.naam}</span>
        <button onclick="event.stopPropagation();verwijderItem(${item.id})" title="Verwijderen" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-light);font-size:0.8rem;padding:0.2rem 0.4rem;border-radius:4px;opacity:0;transition:opacity 0.2s;" class="del-btn">
          <i class="fa fa-trash"></i>
        </button>
      `;
      el.addEventListener('mouseenter', () => el.querySelector('.del-btn').style.opacity = '1');
      el.addEventListener('mouseleave', () => el.querySelector('.del-btn').style.opacity = '0');
      el.addEventListener('click', () => toggleItem(item.id, !item.gedaan));
      itemsDiv.appendChild(el);
    });
    container.appendChild(section);
  });
  updateProgress();
}

async function toggleItem(id, gedaan) {
  await db.from('checklist').update({ gedaan }).eq('id', id);
  const item = items.find(i => i.id === id);
  if (item) item.gedaan = gedaan;
  renderChecklist();
}

async function verwijderItem(id) {
  await db.from('checklist').delete().eq('id', id);
  items = items.filter(i => i.id !== id);
  renderChecklist();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    actieveTab = btn.dataset.tab;
    renderChecklist();
  });
});

document.getElementById('reset-btn').addEventListener('click', async () => {
  const ids = actieveItems().map(i => i.id);
  if (ids.length) await db.from('checklist').update({ gedaan: false }).in('id', ids);
  items.filter(i => (i.type || 'persoonlijk') === actieveTab).forEach(i => { i.gedaan = false; });
  renderChecklist();
});

document.getElementById('alles-btn').addEventListener('click', async () => {
  const ids = actieveItems().map(i => i.id);
  if (ids.length) await db.from('checklist').update({ gedaan: true }).in('id', ids);
  items.filter(i => (i.type || 'persoonlijk') === actieveTab).forEach(i => { i.gedaan = true; });
  renderChecklist();
});

document.getElementById('open-toevoeg-modal').addEventListener('click', () =>
  document.getElementById('toevoeg-modal').classList.add('open'));
document.getElementById('sluit-toevoeg').addEventListener('click', () =>
  document.getElementById('toevoeg-modal').classList.remove('open'));

document.getElementById('sla-item-op').addEventListener('click', async () => {
  const naam = document.getElementById('ni-naam').value.trim();
  if (!naam) { alert('Vul een naam in.'); return; }
  const categorie = document.getElementById('ni-categorie').value;
  const type = document.getElementById('ni-type').value;
  const { data } = await db.from('checklist').insert({ categorie, naam, gedaan: false, type }).select().single();
  if (data) items.push(data);
  if (type !== actieveTab) {
    actieveTab = type;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === type);
    });
  }
  renderChecklist();
  document.getElementById('ni-naam').value = '';
  document.getElementById('toevoeg-modal').classList.remove('open');
});

laadChecklist();
</script>

<nav class="mob-nav">
  <a href="index.html"><i class="fa fa-house"></i><span>Dashboard</span></a>
  <a href="gallery.html"><i class="fa fa-images"></i><span>Galerij</span></a>
  <a href="activities.html"><i class="fa fa-map-pin"></i><span>Activiteiten</span></a>
  <a href="checklist.html" class="active"><i class="fa fa-list-check"></i><span>Inpaklijst</span></a>
</nav>
</body>
</html>
